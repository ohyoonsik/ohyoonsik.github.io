<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>5,6장 과제-3</title>
 <style>
        .font_big { font-size: 2em; }
        .font_italic { font-style: italic; }
        .font_bold { font-weight: bold; }
        .font_center { text-align: center; }
        .text_color {color: white;}

        .button {
            width: 120px;
            height: 50px;
            background-color: orange;
            border-radius: 30px;
        }

        .button > a {
            display: block;
            line-height: 50px;
        }
    </style>
</head>
<body>
    <div class="button">
        <a href="#" class="font_big font_italic font_bold font_center text_color">Click</a>
    </div>
</body>
</html>
