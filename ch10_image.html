<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOM 실습3</title>
</head>
<body>
    <h1>이미지 속성 변경</h1>
    <img id="image" alt="이미지가 여기에 표시됩니다.">
    <br><br>
    <button id="imageButton">이미지 보이기</button>

    <script>
        window.onload = function(){
            let imageButton = document.getElementById('imageButton');
            imageButton.onclick = function(){
                let image = document.getElementById('image');
                image.src = 'http://placehold.co/300x200';
                image.width = 300;
                image.height = 200;
            };
        };
    </script>
</body>
</html>
